<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ground Shock — Probabilistic Prediction</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=JetBrains+Mono:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
:root{
  --paper:#F2F0EA;
  --paper-dim:#E8E4DA;
  --ink:#141311;
  --ink-soft:#3A3733;
  --rule:#C9C3B4;
  --signal-blue:#2B5F8C;
  --signal-blue-soft:#B9D2E4;
  --signal-blue-glass:#E4EDF3;
  --hazard:#D4761A;
  --hazard-soft:#F0D2AE;
  --ok:#3E6B4F;
}

*{box-sizing:border-box;}

html{scroll-behavior:smooth;}

@media (prefers-reduced-motion: reduce){
  html{scroll-behavior:auto;}
  *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
}

body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:'JetBrains Mono', monospace;
  font-size:19px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}

h1,h2,h3,.display{
  font-family:'Source Serif 4', serif;
  font-weight:800;
  letter-spacing:-0.01em;
  margin:0;
  color:var(--ink);
}

a{color:inherit;}

::selection{background:var(--hazard); color:var(--paper);}

:focus-visible{
  outline:3px solid var(--hazard);
  outline-offset:3px;
}

.wrap{
  max-width:1400px;
  margin:0 auto;
  padding:0 clamp(24px, 5vw, 72px);
}

/* ---------- top bar ---------- */

.topbar{
  position:sticky; top:0; z-index:50;
  background:var(--paper);
  border-bottom:1px solid var(--rule);
}
.topbar-inner{
  display:flex; align-items:center; justify-content:space-between;
  padding:22px clamp(24px,5vw,72px);
}
.mark{
  font-family:'Source Serif 4', serif;
  font-weight:800; font-size:26px;
  display:flex; align-items:baseline; gap:10px;
}
.mark .dot{
  width:12px; height:12px; border-radius:50%;
  background:var(--hazard);
  display:inline-block;
}
.status-pill{
  font-size:16px;
  padding:8px 16px;
  border:1px solid var(--rule);
  border-radius:100px;
  display:flex; align-items:center; gap:10px;
}
.status-pill .led{
  width:9px; height:9px; border-radius:50%;
  background:var(--ok);
}
.status-pill.pending .led{background:var(--hazard); animation:blink 1.1s infinite;}
@keyframes blink{50%{opacity:.25;}}

/* ---------- seismograph strip (signature element) ---------- */

.seismo{
  width:100%; height:110px;
  display:block;
  border-bottom:1px solid var(--rule);
}

/* ---------- hero ---------- */

.hero{
  padding:88px 0 64px;
  border-bottom:1px solid var(--rule);
}
.hero-kicker{
  font-size:18px;
  color:var(--ink-soft);
  margin-bottom:22px;
  max-width:640px;
}
.hero h1{
  font-size:clamp(52px, 8vw, 118px);
  line-height:0.94;
}
.hero h1 .accent{color:var(--signal-blue);}
.hero h1 .strike{position:relative; white-space:nowrap;}
.hero-sub{
  margin-top:34px;
  font-size:20px;
  max-width:780px;
  color:var(--ink-soft);
}
.hero-readout{
  margin-top:48px;
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
  gap:0;
  border-top:1px solid var(--rule);
}
.readout-cell{
  padding:22px 24px 22px 0;
  border-right:1px solid var(--rule);
}
.readout-cell:last-child{border-right:none;}
.readout-label{font-size:15px; color:var(--ink-soft);}
.readout-value{
  font-family:'Source Serif 4', serif;
  font-weight:800;
  font-size:38px;
  margin-top:6px;
}
.readout-value.blue{color:var(--signal-blue);}
.readout-value.hazard{color:var(--hazard);}

/* ---------- phase sections ---------- */

.phase{
  padding:96px 0;
  border-bottom:1px solid var(--rule);
}
.phase:nth-child(even){background:var(--paper-dim);}
.phase-head{
  display:flex; align-items:flex-end; justify-content:space-between; gap:32px;
  flex-wrap:wrap;
  margin-bottom:48px;
}
.phase-number{
  font-family:'Source Serif 4', serif;
  font-weight:800;
  font-size:26px;
  color:var(--rule);
  border:1px solid var(--rule);
  border-radius:50%;
  width:64px; height:64px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.phase-title-block{flex:1; min-width:280px;}
.phase-eyebrow{font-size:16px; color:var(--signal-blue); margin-bottom:10px;}
.phase-title{font-size:clamp(34px,4.5vw,56px); line-height:1.02;}
.phase-desc{
  font-size:19px; color:var(--ink-soft);
  max-width:640px; margin-top:18px;
}

.grid-2{
  display:grid; grid-template-columns:1.1fr 1fr;
  gap:56px;
  align-items:start;
}
@media (max-width:920px){.grid-2{grid-template-columns:1fr;}}

.panel{
  background:var(--paper);
  border:1px solid var(--rule);
  padding:32px;
}
.phase:nth-child(even) .panel{background:var(--paper);}

.chart-frame{
  width:100%;
  height:420px;
  position:relative;
}
.chart-caption{
  margin-top:18px;
  font-size:16px;
  color:var(--ink-soft);
  border-top:1px solid var(--rule);
  padding-top:16px;
}

/* ---------- sliders ---------- */

.control{
  margin-bottom:34px;
}
.control:last-child{margin-bottom:0;}
.control-label{
  display:flex; justify-content:space-between; align-items:baseline;
  margin-bottom:14px;
  font-size:18px;
}
.control-value{
  font-family:'Source Serif 4', serif;
  font-weight:800; font-size:28px;
  color:var(--signal-blue);
}
.control-value.hazard{color:var(--hazard);}

input[type="range"]{
  -webkit-appearance:none;
  width:100%;
  height:3px;
  background:var(--rule);
  outline:none;
  margin:0;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:26px; height:26px;
  border-radius:50%;
  background:var(--ink);
  border:4px solid var(--paper);
  box-shadow:0 0 0 1px var(--ink);
  cursor:pointer;
  margin-top:-11.5px;
}
input[type="range"]::-moz-range-thumb{
  width:18px; height:18px;
  border-radius:50%;
  background:var(--ink);
  border:4px solid var(--paper);
  box-shadow:0 0 0 1px var(--ink);
  cursor:pointer;
  border:none;
}
input[type="range"]::-webkit-slider-runnable-track{height:3px; background:var(--rule);}
input[type="range"]::-moz-range-track{height:3px; background:var(--rule);}

.control-scale{
  display:flex; justify-content:space-between;
  font-size:14px; color:var(--ink-soft); margin-top:8px;
}

/* ---------- prediction readout card ---------- */

.predict-out{
  margin-top:28px;
  padding-top:28px;
  border-top:1px solid var(--rule);
}
.predict-row{
  display:flex; justify-content:space-between; align-items:baseline;
  padding:14px 0;
  border-bottom:1px solid var(--rule);
}
.predict-row:last-child{border-bottom:none;}
.predict-row .k{color:var(--ink-soft); font-size:17px;}
.predict-row .v{font-family:'Source Serif 4', serif; font-weight:800; font-size:24px;}

.range-flag{
  margin-top:22px;
  padding:14px 18px;
  border:1px solid var(--hazard);
  color:var(--hazard);
  font-size:16px;
  display:none;
}
.range-flag.show{display:block;}

/* ---------- calibration table ---------- */

.cal-table{
  width:100%;
  border-collapse:collapse;
}
.cal-table th,.cal-table td{
  text-align:left;
  padding:16px 12px;
  border-bottom:1px solid var(--rule);
  font-size:18px;
}
.cal-table th{
  color:var(--ink-soft);
  font-weight:400;
  font-size:15px;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.cal-pass{color:var(--ok); font-weight:700;}
.cal-fail{color:var(--hazard); font-weight:700;}

/* ---------- inversion points editor ---------- */

.point-row{
  display:grid;
  grid-template-columns:1fr 1fr auto;
  gap:14px;
  margin-bottom:12px;
  align-items:center;
}
.point-row input[type="number"]{
  width:100%;
  font-family:'JetBrains Mono', monospace;
  font-size:17px;
  padding:12px 14px;
  border:1px solid var(--rule);
  background:var(--paper);
  color:var(--ink);
}
.point-row input:focus{outline:2px solid var(--signal-blue); outline-offset:0;}
.point-remove{
  background:none; border:1px solid var(--rule);
  width:44px; height:44px;
  font-size:20px;
  cursor:pointer;
  color:var(--ink-soft);
}
.point-remove:hover{border-color:var(--hazard); color:var(--hazard);}

.btn{
  font-family:'JetBrains Mono', monospace;
  font-size:17px;
  padding:16px 28px;
  background:var(--ink);
  color:var(--paper);
  border:none;
  cursor:pointer;
  transition:transform .12s ease;
}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:translateY(0);}
.btn.ghost{
  background:none;
  color:var(--ink);
  border:1px solid var(--rule);
}
.btn.ghost:hover{border-color:var(--ink);}
.btn:disabled{opacity:.4; cursor:not-allowed; transform:none;}

.btn-row{display:flex; gap:14px; flex-wrap:wrap; margin-top:20px;}

/* ---------- 3D surface section ---------- */

.surface-frame{
  width:100%;
  height:560px;
  position:relative;
  border:1px solid var(--rule);
  background:var(--paper);
  cursor:grab;
}
.surface-frame:active{cursor:grabbing;}
.surface-legend{
  position:absolute; top:20px; left:20px;
  font-size:15px;
  color:var(--ink-soft);
  line-height:1.7;
  pointer-events:none;
}
.surface-legend .lk{
  display:inline-block; width:12px; height:12px; margin-right:8px;
  vertical-align:middle;
}

/* ---------- footer ---------- */

footer{
  padding:64px 0 48px;
  display:flex; justify-content:space-between; align-items:flex-end;
  flex-wrap:wrap; gap:24px;
}
footer .ref{
  font-size:16px; color:var(--ink-soft);
  max-width:520px;
}
footer .stamp{
  font-family:'Source Serif 4', serif;
  font-weight:800;
  font-size:22px;
}

/* ---------- error state ---------- */

.err-banner{
  background:var(--ink);
  color:var(--paper);
  padding:20px 24px;
  font-size:17px;
  display:none;
}
.err-banner.show{display:block;}
.err-banner code{color:var(--hazard);}

@media (max-width:640px){
  body{font-size:17px;}
  .phase{padding:64px 0;}
  .panel{padding:22px;}
}
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState, useEffect, useRef, useCallback, useMemo} = React;

/* ---- endpoints exactly as server.py defines them ---- */
const API_BASE = window.location.origin;
const EP = {
  curve:   `${API_BASE}/api/calibration-curve`,
  predict: (z) => `${API_BASE}/api/predict?z=${encodeURIComponent(z)}`,
  invert:  `${API_BASE}/api/invert`,
};

function useApi(url, {skip=false} = {}) {
  const [state, setState] = useState({data:null, loading:!skip, error:null});
  useEffect(() => {
    if (skip) return;
    let alive = true;
    setState(s => ({...s, loading:true, error:null}));
    fetch(url)
      .then(r => { if(!r.ok) throw new Error(`${r.status} ${r.statusText}`); return r.json(); })
      .then(d => { if(alive) setState({data:d, loading:false, error:null}); })
      .catch(e => { if(alive) setState({data:null, loading:false, error:e.message}); });
    return () => { alive = false; };
  }, [url, skip]);
  return state;
}

/* =========================================================
   SEISMOGRAPH — signature element, drawn from real bands
   ========================================================= */
function Seismograph({curve}) {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.clientWidth, h = canvas.clientHeight;
    canvas.width = w*dpr; canvas.height = h*dpr;
    ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,w,h);

    if (!curve) {
      // idle flatline until data arrives
      ctx.strokeStyle = '#C9C3B4';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, h/2);
      ctx.lineTo(w, h/2);
      ctx.stroke();
      return;
    }

    const upper = curve.bands["0.9"].upper;
    const lower = curve.bands["0.9"].lower;
    const n = upper.length;
    const allVals = upper.concat(lower);
    const min = Math.min(...allVals), max = Math.max(...allVals);
    const pad = 14;

    const xAt = i => (i/(n-1)) * w;
    const yAt = v => h - pad - ((v-min)/(max-min)) * (h - pad*2);

    ctx.beginPath();
    for (let i=0;i<n;i++){
      const x = xAt(i), y = yAt(upper[i]);
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    for (let i=n-1;i>=0;i--){
      ctx.lineTo(xAt(i), yAt(lower[i]));
    }
    ctx.closePath();
    ctx.fillStyle = '#E4EDF3';
    ctx.fill();

    ctx.beginPath();
    ctx.strokeStyle = '#2B5F8C';
    ctx.lineWidth = 1.75;
    for (let i=0;i<n;i++){
      const mean = (upper[i]+lower[i])/2;
      const x = xAt(i), y = yAt(mean);
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }, [curve]);

  return <canvas ref={canvasRef} className="seismo" aria-hidden="true"></canvas>;
}

/* =========================================================
   PHASE 1 — RAW DATA + TRUE CURVE (Chart.js)
   ========================================================= */
function RawDataChart({curve}) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!curve || !canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();

    const scatterPts = curve.scatter.z.map((z,i) => ({x:z, y:curve.scatter.v[i]}));
    const truePts = curve.z_grid.map((z,i) => ({x:z, y:curve.true_grid[i]}));

    chartRef.current = new Chart(canvasRef.current, {
      type:'scatter',
      data:{
        datasets:[
          {
            label:'synthetic field readings',
            data:scatterPts,
            backgroundColor:'rgba(58,55,51,0.32)',
            pointRadius:2.5,
            showLine:false,
          },
          {
            label:'UFC Eq. 2-85',
            data:truePts,
            type:'line',
            borderColor:'#141311',
            borderWidth:2.5,
            pointRadius:0,
            fill:false,
          },
        ],
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        scales:{
          x:{type:'logarithmic', title:{display:true, text:'scaled distance Z (ft / lb^1/3)', font:{family:"'JetBrains Mono'", size:14}}, ticks:{font:{family:"'JetBrains Mono'", size:12}}, grid:{color:'#E8E4DA'}},
          y:{type:'logarithmic', title:{display:true, text:'peak particle velocity (in/sec)', font:{family:"'JetBrains Mono'", size:14}}, ticks:{font:{family:"'JetBrains Mono'", size:12}}, grid:{color:'#E8E4DA'}},
        },
        plugins:{
          legend:{labels:{font:{family:"'JetBrains Mono'", size:14}, usePointStyle:true}},
          tooltip:{bodyFont:{family:"'JetBrains Mono'"}, titleFont:{family:"'JetBrains Mono'"}},
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [curve]);

  return <div className="chart-frame"><canvas ref={canvasRef}></canvas></div>;
}

/* =========================================================
   PHASE 2 — GP FIT WITH BANDS (Chart.js)
   ========================================================= */
function GPFitChart({curve}) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!curve || !canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();

    const upper90 = curve.z_grid.map((z,i) => ({x:z, y:curve.bands["0.9"].upper[i]}));
    const lower90 = curve.z_grid.map((z,i) => ({x:z, y:curve.bands["0.9"].lower[i]}));
    const mean = curve.z_grid.map((z,i) => ({x:z, y:curve.mean_grid[i]}));
    const testPts = curve.test_points.z.map((z,i) => ({x:z, y:curve.test_points.v[i]}));

    chartRef.current = new Chart(canvasRef.current, {
      type:'line',
      data:{
        datasets:[
          {label:'90% band — upper', data:upper90, borderColor:'transparent', backgroundColor:'rgba(43,95,140,0.16)', pointRadius:0, fill:'+1'},
          {label:'90% band — lower', data:lower90, borderColor:'transparent', pointRadius:0, fill:false},
          {label:'GP mean', data:mean, borderColor:'#2B5F8C', borderWidth:2.5, pointRadius:0, fill:false},
          {label:'test points', data:testPts, type:'scatter', backgroundColor:'#D4761A', pointRadius:4, showLine:false},
        ],
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        scales:{
          x:{type:'logarithmic', title:{display:true, text:'scaled distance Z', font:{family:"'JetBrains Mono'", size:14}}, ticks:{font:{family:"'JetBrains Mono'", size:12}}, grid:{color:'#E8E4DA'}},
          y:{type:'logarithmic', title:{display:true, text:'PPV (in/sec)', font:{family:"'JetBrains Mono'", size:14}}, ticks:{font:{family:"'JetBrains Mono'", size:12}}, grid:{color:'#E8E4DA'}},
        },
        plugins:{
          legend:{labels:{font:{family:"'JetBrains Mono'", size:13}, usePointStyle:true, filter:(item)=>item.text!=='90% band — lower'}},
          tooltip:{bodyFont:{family:"'JetBrains Mono'"}, titleFont:{family:"'JetBrains Mono'"}},
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [curve]);

  return <div className="chart-frame"><canvas ref={canvasRef}></canvas></div>;
}

/* =========================================================
   PREDICTION SLIDER — hits /api/predict live
   ========================================================= */
function PredictPanel({curve}) {
  const [z, setZ] = useState(20);
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
  const debounceRef = useRef(null);

  useEffect(() => {
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      setLoading(true); setErr(null);
      fetch(EP.predict(z))
        .then(r => { if(!r.ok) throw new Error(`server returned ${r.status}`); return r.json(); })
        .then(d => { if (d.error) throw new Error(d.error); setResult(d); setLoading(false); })
        .catch(e => { setErr(e.message); setLoading(false); });
    }, 140);
    return () => clearTimeout(debounceRef.current);
  }, [z]);

  return (
    <div className="panel">
      <div className="control">
        <div className="control-label">
          <span>query scaled distance Z</span>
          <span className="control-value">{z.toFixed(1)} <span style={{fontSize:'17px', color:'var(--ink-soft)'}}>ft/lb^1/3</span></span>
        </div>
        <input
          type="range" min="0.5" max="150" step="0.1"
          value={z}
          onChange={e => setZ(parseFloat(e.target.value))}
          aria-label="scaled distance query"
        />
        <div className="control-scale"><span>0.5</span><span>150</span></div>
      </div>

      {err && <div className="range-flag show">request failed — {err}</div>}

      {result && !err && (
        <div className="predict-out">
          <div className="predict-row"><span className="k">GP mean velocity</span><span className="v">{result.mean_velocity.toFixed(3)} in/s</span></div>
          <div className="predict-row"><span className="k">UFC Eq. 2-85 velocity</span><span className="v">{result.true_ufc_velocity.toFixed(3)} in/s</span></div>
          <div className="predict-row"><span className="k">90% interval</span><span className="v">{result.intervals["0.9"].lower.toFixed(2)} – {result.intervals["0.9"].upper.toFixed(2)}</span></div>
          <div className="predict-row"><span className="k">95% interval</span><span className="v">{result.intervals["0.95"].lower.toFixed(2)} – {result.intervals["0.95"].upper.toFixed(2)}</span></div>
          <div className={`range-flag ${!result.in_training_range ? 'show' : ''}`}>
            outside the training range — extrapolated, treat with caution
          </div>
        </div>
      )}
      {loading && <div style={{marginTop:'18px', color:'var(--ink-soft)', fontSize:'16px'}}>querying model —</div>}
    </div>
  );
}

/* =========================================================
   CALIBRATION TABLE — from curve.coverage
   ========================================================= */
function CalibrationTable({curve}) {
  if (!curve) return null;
  const levels = Object.keys(curve.coverage).map(Number).sort((a,b)=>a-b);
  return (
    <table className="cal-table">
      <thead>
        <tr><th>expected</th><th>observed</th><th>result</th></tr>
      </thead>
      <tbody>
        {levels.map(level => {
          const observed = curve.coverage[String(level)];
          const pass = Math.abs(observed - level) <= 0.05;
          return (
            <tr key={level}>
              <td>{(level*100).toFixed(0)}%</td>
              <td>{(observed*100).toFixed(1)}%</td>
              <td className={pass ? 'cal-pass' : 'cal-fail'}>{pass ? 'PASS' : 'FAIL'}</td>
            </tr>
          );
        })}
      </tbody>
    </table>
  );
}

function CalibrationChart({curve}) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!curve || !canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();

    const levels = Object.keys(curve.coverage).map(Number).sort((a,b)=>a-b);
    const observed = levels.map(l => curve.coverage[String(l)]);

    chartRef.current = new Chart(canvasRef.current, {
      type:'line',
      data:{
        datasets:[
          {label:'perfect calibration', data:[{x:0,y:0},{x:1,y:1}], borderColor:'#C9C3B4', borderDash:[6,6], borderWidth:1.5, pointRadius:0},
          {label:'observed', data:levels.map((l,i)=>({x:l,y:observed[i]})), borderColor:'#2B5F8C', backgroundColor:'#2B5F8C', borderWidth:2.5, pointRadius:6, pointBackgroundColor:'#2B5F8C'},
        ],
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        aspectRatio:1,
        scales:{
          x:{min:0, max:1, title:{display:true, text:'expected coverage', font:{family:"'JetBrains Mono'", size:14}}, ticks:{font:{family:"'JetBrains Mono'", size:12}}, grid:{color:'#E8E4DA'}},
          y:{min:0, max:1, title:{display:true, text:'observed coverage', font:{family:"'JetBrains Mono'", size:14}}, ticks:{font:{family:"'JetBrains Mono'", size:12}}, grid:{color:'#E8E4DA'}},
        },
        plugins:{
          legend:{labels:{font:{family:"'JetBrains Mono'", size:13}, usePointStyle:true}},
          tooltip:{bodyFont:{family:"'JetBrains Mono'"}, titleFont:{family:"'JetBrains Mono'"}},
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [curve]);

  return <div className="chart-frame" style={{height:'380px'}}><canvas ref={canvasRef}></canvas></div>;
}

/* =========================================================
   INVERSION PANEL — posts to /api/invert
   ========================================================= */
function InversionPanel() {
  const [points, setPoints] = useState([
    {z:5, v:12.4}, {z:12, v:3.1}, {z:28, v:0.72}, {z:45, v:0.31},
  ]);
  const [seed, setSeed] = useState(99);
  const [useCustom, setUseCustom] = useState(false);
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  const updatePoint = (idx, key, val) => {
    setPoints(pts => pts.map((p,i) => i===idx ? {...p, [key]: val} : p));
  };
  const addPoint = () => setPoints(pts => [...pts, {z:10, v:1}]);
  const removePoint = (idx) => setPoints(pts => pts.filter((_,i) => i!==idx));

  const runInversion = useCallback(() => {
    setLoading(true); setErr(null);
    const body = useCustom
      ? {points: points.map(p => ({z:parseFloat(p.z), v:parseFloat(p.v)}))}
      : {seed};
    fetch(EP.invert, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body),
    })
      .then(r => { if(!r.ok) return r.json().then(d=>{throw new Error(d.error || `server returned ${r.status}`)}); return r.json(); })
      .then(d => { setResult(d); setLoading(false); })
      .catch(e => { setErr(e.message); setLoading(false); });
  }, [points, seed, useCustom]);

  useEffect(() => { runInversion(); }, []); // eslint-disable-line

  useEffect(() => {
    if (!result || !canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();

    const recovered = result.dist_grid.map((z,i) => ({x:z, y:result.recovered_curve[i]}));
    const ufc = result.dist_grid.map((z,i) => ({x:z, y:result.ufc_curve[i]}));
    const field = result.field_points.z.map((z,i) => ({x:z, y:result.field_points.v[i]}));

    const datasets = [
      {label:'field measurements', data:field, type:'scatter', backgroundColor:'#D4761A', pointRadius:5, showLine:false},
      {label:'recovered fit', data:recovered, borderColor:'#141311', borderWidth:2.5, pointRadius:0, fill:false},
      {label:'UFC Eq. 2-85', data:ufc, borderColor:'#C9C3B4', borderWidth:1.5, borderDash:[5,5], pointRadius:0, fill:false},
    ];
    if (result.has_ground_truth) {
      const trueCurve = result.dist_grid.map((z,i) => ({x:z, y:result.true_curve[i]}));
      datasets.push({label:'true curve', data:trueCurve, borderColor:'#2B5F8C', borderWidth:1.75, pointRadius:0, fill:false});
    }

    chartRef.current = new Chart(canvasRef.current, {
      type:'line',
      data:{datasets},
      options:{
        responsive:true, maintainAspectRatio:false,
        scales:{
          x:{type:'logarithmic', title:{display:true, text:'scaled distance Z', font:{family:"'JetBrains Mono'", size:14}}, ticks:{font:{family:"'JetBrains Mono'", size:12}}, grid:{color:'#E8E4DA'}},
          y:{type:'logarithmic', title:{display:true, text:'PPV (in/sec)', font:{family:"'JetBrains Mono'", size:14}}, ticks:{font:{family:"'JetBrains Mono'", size:12}}, grid:{color:'#E8E4DA'}},
        },
        plugins:{
          legend:{labels:{font:{family:"'JetBrains Mono'", size:13}, usePointStyle:true}},
          tooltip:{bodyFont:{family:"'JetBrains Mono'"}, titleFont:{family:"'JetBrains Mono'"}},
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [result]);

  return (
    <div className="grid-2">
      <div className="panel">
        <div className="control-label" style={{marginBottom:'20px'}}>
          <span>input mode</span>
        </div>
        <div className="btn-row" style={{marginTop:0, marginBottom:'26px'}}>
          <button className={`btn ${!useCustom ? '' : 'ghost'}`} onClick={()=>setUseCustom(false)}>simulated field data</button>
          <button className={`btn ${useCustom ? '' : 'ghost'}`} onClick={()=>setUseCustom(true)}>my own points</button>
        </div>

        {!useCustom && (
          <div className="control">
            <div className="control-label">
              <span>random seed</span>
              <span className="control-value hazard">{seed}</span>
            </div>
            <input type="range" min="1" max="999" step="1" value={seed}
              onChange={e => setSeed(parseInt(e.target.value))} aria-label="field data seed" />
            <div className="control-scale"><span>1</span><span>999</span></div>
          </div>
        )}

        {useCustom && (
          <div>
            {points.map((p, idx) => (
              <div className="point-row" key={idx}>
                <input type="number" step="0.1" value={p.z} onChange={e => updatePoint(idx,'z',e.target.value)} aria-label={`Z for point ${idx+1}`} placeholder="Z" />
                <input type="number" step="0.01" value={p.v} onChange={e => updatePoint(idx,'v',e.target.value)} aria-label={`velocity for point ${idx+1}`} placeholder="velocity" />
                <button className="point-remove" onClick={()=>removePoint(idx)} aria-label={`remove point ${idx+1}`}>×</button>
              </div>
            ))}
            <button className="btn ghost" onClick={addPoint} style={{marginTop:'8px'}}>+ add point</button>
          </div>
        )}

        <div className="btn-row">
          <button className="btn" onClick={runInversion} disabled={loading || (useCustom && points.length < 2)}>
            {loading ? 'recovering —' : 'recover soil parameters'}
          </button>
        </div>

        {err && <div className="range-flag show" style={{marginTop:'24px'}}>{err}</div>}

        {result && !err && (
          <div className="predict-out">
            <div className="predict-row"><span className="k">recovered n (attenuation exponent)</span><span className="v">{result.recovered_n.toFixed(4)}</span></div>
            <div className="predict-row"><span className="k">recovered k (coupling constant)</span><span className="v">{result.recovered_k.toFixed(2)}</span></div>
            {result.has_ground_truth && (
              <>
                <div className="predict-row"><span className="k">true n</span><span className="v">{result.true_n.toFixed(2)}</span></div>
                <div className="predict-row"><span className="k">true k</span><span className="v">{result.true_k.toFixed(2)}</span></div>
              </>
            )}
          </div>
        )}
      </div>

      <div className="panel">
        <div className="chart-frame"><canvas ref={canvasRef}></canvas></div>
        <div className="chart-caption">300 Adam epochs, loss curve thinned to every 5th step server-side. n and k recovered jointly in log space.</div>
      </div>
    </div>
  );
}

/* =========================================================
   3D SURFACE — mean +/- sigma across distance (Three.js)
   real data from curve.z_grid / mean_grid / bands
   ========================================================= */
function Surface3D({curve}) {
  const mountRef = useRef(null);
  const stateRef = useRef({});

  useEffect(() => {
    if (!curve || !mountRef.current) return;
    const mount = mountRef.current;
    const width = mount.clientWidth, height = mount.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xF2F0EA);

    const camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
    camera.position.set(60, 45, 70);
    camera.lookAt(0,0,0);

    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    mount.innerHTML = '';
    mount.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.75);
    scene.add(ambient);
    const dir = new THREE.DirectionalLight(0xffffff, 0.6);
    dir.position.set(40,60,30);
    scene.add(dir);

    // Build surface: X = log distance index, Z = -1..1 across the band (visualizing
    // sigma as a physical width), Y = velocity (log-scaled for readability)
    const n = curve.z_grid.length;
    const bandSteps = 24;
    const logV = curve.mean_grid.map((v,i) => Math.log(v));
    const sigmaProxy = curve.z_grid.map((z,i) => {
      const u = curve.bands["0.9"].upper[i], l = curve.bands["0.9"].lower[i];
      return (Math.log(u) - Math.log(l)) / 2;
    });

    const yMin = Math.min(...logV), yMax = Math.max(...logV);
    const scaleY = (v) => ((v - yMin)/(yMax-yMin)) * 34 - 17;
    const scaleX = (i) => (i/(n-1)) * 70 - 35;

    const geometry = new THREE.BufferGeometry();
    const positions = [];
    const colors = [];
    const colorMean = new THREE.Color(0x2B5F8C);
    const colorEdge = new THREE.Color(0xB9D2E4);

    const step = Math.max(1, Math.floor(n / 90)); // decimate for perf, real data
    const xs = [];
    for (let i=0;i<n;i+=step) xs.push(i);
    if (xs[xs.length-1] !== n-1) xs.push(n-1);

    for (let xi=0; xi<xs.length-1; xi++){
      const i0 = xs[xi], i1 = xs[xi+1];
      for (let b=0; b<bandSteps; b++){
        const t0 = -1 + (2*b)/bandSteps;
        const t1 = -1 + (2*(b+1))/bandSteps;

        const y0a = scaleY(logV[i0] + t0*sigmaProxy[i0]);
        const y0b = scaleY(logV[i0] + t1*sigmaProxy[i0]);
        const y1a = scaleY(logV[i1] + t0*sigmaProxy[i1]);
        const y1b = scaleY(logV[i1] + t1*sigmaProxy[i1]);

        const x0 = scaleX(i0), x1 = scaleX(i1);
        const z0a = t0*16, z0b = t1*16, z1a = t0*16, z1b = t1*16;

        // two triangles per quad
        positions.push(x0,y0a,z0a,  x1,y1a,z1a,  x0,y0b,z0b);
        positions.push(x1,y1a,z1a,  x1,y1b,z1b,  x0,y0b,z0b);

        const centerness = 1 - Math.abs((t0+t1)/2);
        const c = colorEdge.clone().lerp(colorMean, centerness*0.85);
        for (let k=0;k<6;k++) colors.push(c.r,c.g,c.b);
      }
    }

    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));
    geometry.computeVertexNormals();

    const material = new THREE.MeshLambertMaterial({vertexColors:true, side:THREE.DoubleSide});
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // mean ridge line, drawn heavier
    const ridgePts = xs.map(i => new THREE.Vector3(scaleX(i), scaleY(logV[i]), 0));
    const ridgeGeo = new THREE.BufferGeometry().setFromPoints(ridgePts);
    const ridgeMat = new THREE.LineBasicMaterial({color:0x141311, linewidth:2});
    scene.add(new THREE.Line(ridgeGeo, ridgeMat));

    // axes guide (minimal, no chart-junk)
    const axesHelper = new THREE.AxesHelper(38);
    axesHelper.material.opacity = 0.15;
    axesHelper.material.transparent = true;
    scene.add(axesHelper);

    // interaction: drag to orbit
    let isDown=false, prevX=0, prevY=0, rotY=0.6, rotX=0.35;
    const onDown = (e) => { isDown=true; const p=e.touches?e.touches[0]:e; prevX=p.clientX; prevY=p.clientY; };
    const onUp = () => { isDown=false; };
    const onMove = (e) => {
      if (!isDown) return;
      const p = e.touches?e.touches[0]:e;
      const dx = p.clientX - prevX, dy = p.clientY - prevY;
      rotY += dx*0.006; rotX = Math.max(0.05, Math.min(1.3, rotX + dy*0.006));
      prevX = p.clientX; prevY = p.clientY;
    };
    renderer.domElement.addEventListener('mousedown', onDown);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    renderer.domElement.addEventListener('touchstart', onDown, {passive:true});
    window.addEventListener('touchend', onUp);
    window.addEventListener('touchmove', onMove, {passive:true});

    let raf;
    const radius = 95;
    const animate = () => {
      camera.position.x = radius * Math.sin(rotY) * Math.cos(rotX);
      camera.position.z = radius * Math.cos(rotY) * Math.cos(rotX);
      camera.position.y = radius * Math.sin(rotX) + 8;
      camera.lookAt(0,0,0);
      renderer.render(scene, camera);
      raf = requestAnimationFrame(animate);
    };
    animate();

    const onResize = () => {
      const w = mount.clientWidth, h = mount.clientHeight;
      camera.aspect = w/h; camera.updateProjectionMatrix();
      renderer.setSize(w,h);
    };
    window.addEventListener('resize', onResize);

    stateRef.current = {renderer, onResize, onDown, onUp, onMove, raf};

    return () => {
      cancelAnimationFrame(stateRef.current.raf);
      window.removeEventListener('resize', stateRef.current.onResize);
      window.removeEventListener('mouseup', stateRef.current.onUp);
      window.removeEventListener('mousemove', stateRef.current.onMove);
      window.removeEventListener('touchend', stateRef.current.onUp);
      window.removeEventListener('touchmove', stateRef.current.onMove);
      renderer.dispose();
      geometry.dispose();
      material.dispose();
      mount.innerHTML = '';
    };
  }, [curve]);

  return (
    <div className="surface-frame" ref={mountRef}>
      <div className="surface-legend">
        <div><span className="lk" style={{background:'#141311'}}></span>mean ridge (log-space)</div>
        <div><span className="lk" style={{background:'#2B5F8C'}}></span>90% band, center</div>
        <div><span className="lk" style={{background:'#B9D2E4'}}></span>90% band, edge</div>
        <div style={{marginTop:'8px', color:'var(--rule)'}}>drag to orbit</div>
      </div>
    </div>
  );
}

/* =========================================================
   ROOT APP
   ========================================================= */
function App() {
  const {data:curve, loading, error} = useApi(EP.curve);

  return (
    <React.Fragment>

      <div className="topbar">
        <div className="topbar-inner">
          <div className="mark"><span className="dot"></span>GROUND SHOCK / PROJECT 03</div>
          <div className={`status-pill ${loading ? 'pending' : ''}`}>
            <span className="led"></span>
            {loading ? 'fitting GP —' : error ? 'connection lost' : 'model live'}
          </div>
        </div>
      </div>

      <Seismograph curve={curve} />

      {error && (
        <div className="err-banner show">
          Could not reach the model server at <code>{API_BASE}</code>. Run <code>python server.py</code> and reload this page. ({error})
        </div>
      )}

      <div className="wrap">

        <section className="hero">
          <div className="hero-kicker">UFC Eq. 2-85 / Eq. 2-87 — heteroscedastic Gaussian Process — calibrated uncertainty</div>
          <h1>Ground shock is <span className="accent">a distribution,</span><br/>not a number.</h1>
          <p className="hero-sub">
            A single deterministic point estimate hides how much the ground truly disagrees with itself
            at close range. This model predicts peak particle velocity from scaled distance and reports
            an interval that has been checked, not assumed, to actually contain the truth.
          </p>

          {curve && (
            <div className="hero-readout">
              <div className="readout-cell">
                <div className="readout-label">training points</div>
                <div className="readout-value">800</div>
              </div>
              <div className="readout-cell">
                <div className="readout-label">held-out test points</div>
                <div className="readout-value">100</div>
              </div>
              <div className="readout-cell">
                <div className="readout-label">90% coverage, observed</div>
                <div className="readout-value blue">{(curve.coverage["0.9"]*100).toFixed(1)}%</div>
              </div>
              <div className="readout-cell">
                <div className="readout-label">distance range</div>
                <div className="readout-value hazard">{Math.min(...curve.z_grid).toFixed(1)}–{Math.max(...curve.z_grid).toFixed(0)}</div>
              </div>
            </div>
          )}
        </section>

        {/* PHASE 1 */}
        <section className="phase">
          <div className="phase-head">
            <div className="phase-number">1</div>
            <div className="phase-title-block">
              <div className="phase-eyebrow">PHASE 01 / DATASET</div>
              <h2 className="phase-title">1,000 synthetic readings, noise that shrinks with distance.</h2>
              <p className="phase-desc">
                Scatter is drawn on a log scale between 1 and 100 ft/lb^(1/3). Near-field points carry more
                scatter than far-field points, mirroring how local soil coupling adds noise close to the charge.
              </p>
            </div>
          </div>
          <RawDataChart curve={curve} />
        </section>

        {/* PHASE 2 */}
        <section className="phase">
          <div className="phase-head">
            <div className="phase-number">2</div>
            <div className="phase-title-block">
              <div className="phase-eyebrow">PHASE 02 / MODEL + LIVE QUERY</div>
              <h2 className="phase-title">Move the slider. The model answers from disk, not from a lookup table.</h2>
              <p className="phase-desc">
                Every position hits <code>/api/predict</code> on the running Flask server and returns the GP's
                mean plus 50/80/90/95% intervals for that exact distance.
              </p>
            </div>
          </div>
          <div className="grid-2">
            <div className="panel">
              <GPFitChart curve={curve} />
              <div className="chart-caption">shaded band is the 90% predictive interval across the full fitted range. orange points are the held-out test set.</div>

            <PredictPanel curve={curve} />

        </section>

        {/* PHASE 3 */}
        <section className="phase">
          <div className="phase-head">
            <div className="phase-number">3</div>

              <div className="phase-eyebrow">PHASE 03 / CALIBRATION</div>

            This page only calls the three routes server.py exposes.
          </div>
          <div className="stamp">PROJECT 03</div>
        </footer>

      </div>
    </React.Fragment>
  );
}
